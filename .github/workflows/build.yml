name: Build and Package

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    
    steps:
    - name: Install system dependencies
      run: |
        dnf -y update
        dnf -y install \
          git make nodejs npm jq \
          gettext \
          rpm-build nodejs-packaging \
          libappstream-glib appstream \
          nodejs-esbuild \
          tar xz file findutils

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Verify git checkout
      run: |
        git rev-parse --is-inside-work-tree
        git rev-parse --show-toplevel
        git describe --always --dirty

    - name: Install npm dependencies
      run: npm install --legacy-peer-deps

    - name: Build dist and RPM
      run: |
        # make rpm automatically builds the dist folder and packages it
        make rpm

    - name: Upload dist directory
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
        retention-days: 7

    - name: Upload RPM package
      uses: actions/upload-artifact@v4
      with:
        name: cockpit-ai-agent-rpm
        path: "*.rpm"
        retention-days: 7

  release-assets:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Download RPM artifact
        uses: actions/download-artifact@v4
        with:
          name: cockpit-ai-agent-rpm
      
      - name: Upload RPM to Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.rpm"
